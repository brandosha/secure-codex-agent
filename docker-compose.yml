services:
  agent:
    build: ./agent
    restart: unless-stopped
    volumes:
      - ./workspace:/home/agent/workspace
      - codex-home:/home/agent/.codex
    environment:
      - CODEX_HOME=/home/agent/.codex
      - HOST_UID=${HOST_UID}
  tools:
    build: ./tools
    restart: unless-stopped
    volumes:
      - ./workspace:/home/agent/workspace
      - ./tools:/home/agent/app
    environment:
      - HOST_UID=${HOST_UID}
    ports:
      - "8002:80"

volumes:
  codex-home:
