services:
  agent:
    build: ./agent
    restart: unless-stopped
    volumes:
      - ./workspace:/home/agent/workspace
      - codex-home:/home/agent/.codex
    environment:
      - CODEX_HOME=/home/agent/.codex
      - HOST_UID=${HOST_UID}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
  tools:
    build: ./tools
    restart: unless-stopped
    volumes:
      - ./workspace:/home/agent/workspace
      - ./tools:/home/agent/app
      - tools-ssh:/home/agent/.ssh
    environment:
      - HOST_UID=${HOST_UID}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
    ports:
      - "8002:80"

volumes:
  codex-home:
  tools-ssh:
