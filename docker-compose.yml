services:
  agent:
    build: ./agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net'); const s=net.connect(80,'127.0.0.1',()=>process.exit(0)); s.on('error',()=>process.exit(1)); s.setTimeout(1000,()=>process.exit(1));"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    volumes:
      - ./workspace:/home/agent/workspace
      - ./agent/data:/home/agent/.secure-codex-agent
      - codex-home:/home/agent/.codex
    environment:
      - CODEX_HOME=/home/agent/.codex
      - HOST_UID=${HOST_UID}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
    networks:
      - browser-net
      - tools-net
  tools:
    build: ./tools
    restart: unless-stopped
    volumes:
      - ./workspace:/home/agent/workspace
      - ./tools:/home/agent/app
      - tools-ssh:/home/agent/.ssh
    environment:
      - HOST_UID=${HOST_UID}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
    ports:
      - "8002:80"
    depends_on:
      agent:
        condition: service_healthy
    networks:
      - tools-net
  browser:
    build: ./browser
    restart: unless-stopped
    volumes:
      - ./workspace:/home/agent/workspace
      - browser-data:/home/agent/.browser-data
    environment:
      - HOST_UID=${HOST_UID}
    networks:
      - browser-net

volumes:
  codex-home:
  tools-ssh:
  browser-data:

networks:
  browser-net:
  tools-net:
