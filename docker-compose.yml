services:
  agent:
    build: ./agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net'); const s=net.connect(80,'127.0.0.1',()=>process.exit(0)); s.on('error',()=>process.exit(1)); s.setTimeout(1000,()=>process.exit(1));"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s
    volumes:
      - ./workspace:/home/agent/workspace
      - ./agent/data:/home/agent/.secure-codex-agent
      - codex-home:/home/agent/.codex
    environment:
      - CODEX_HOME=/home/agent/.codex
      - HOST_UID=${HOST_UID}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
      - HTTP_PROXY=http://egress-proxy:10000
      - HTTPS_PROXY=http://egress-proxy:10000
      - http_proxy=http://egress-proxy:10000
      - https_proxy=http://egress-proxy:10000
      - NO_PROXY=localhost,127.0.0.1,::1,agent,browser,tools,agent.localhost
      - no_proxy=localhost,127.0.0.1,::1,agent,browser,tools,agent.localhost
    networks:
      - agent-browser-net
      - agent-tools-net
  tools:
    build: ./tools
    restart: unless-stopped
    volumes:
      - ./workspace:/home/agent/workspace
      - ./tools:/home/agent/app
      - tools-ssh:/home/agent/.ssh
    environment:
      - HOST_UID=${HOST_UID}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
    ports:
      - "8002:80"
    depends_on:
      agent:
        condition: service_healthy
    networks:
      - agent-tools-net
      - tools-net
  browser:
    build: ./browser
    restart: unless-stopped
    volumes:
      - ./workspace:/home/agent/workspace
      - browser-data:/home/agent/.browser-data
    environment:
      - HOST_UID=${HOST_UID}
      - HTTP_PROXY=http://egress-proxy:10000
      - HTTPS_PROXY=http://egress-proxy:10000
      - http_proxy=http://egress-proxy:10000
      - https_proxy=http://egress-proxy:10000
      - NO_PROXY=localhost,127.0.0.1,::1,agent,browser,tools,agent.localhost
      - no_proxy=localhost,127.0.0.1,::1,agent,browser,tools,agent.localhost
    networks:
      - agent-browser-net
  egress-proxy:
    build: ./egress-proxy
    restart: unless-stopped
    volumes: 
      - ./egress-proxy/policy:/app/policy:ro
    networks:
      - agent-browser-net
      - egress-net

volumes:
  codex-home:
  tools-ssh:
  browser-data:

networks:
  agent-browser-net:
    internal: true
  agent-tools-net:
    internal: true
  tools-net:
  egress-net:
