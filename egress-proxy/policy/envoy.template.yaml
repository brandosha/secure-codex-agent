admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: 9901

static_resources:
  listeners:
    - name: egress_proxy
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: egress_proxy
                codec_type: AUTO
                access_log:
                  - name: envoy.access_loggers.stdout
                    filter:
                      status_code_filter:
                        comparison:
                          op: EQ
                          value:
                            default_value: 403
                            runtime_key: egress_proxy.access_log.rejected_status
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        text_format: "REJECTED time=%START_TIME% method=%REQ(:METHOD)% authority=%REQ(:AUTHORITY)% path=%REQ(:PATH)% status=%RESPONSE_CODE% flags=%RESPONSE_FLAGS% downstream=%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT%\n"
                upgrade_configs:
                  - upgrade_type: CONNECT
                route_config:
                  name: egress_proxy_routes
                  virtual_hosts:
                    - name: forward_proxy
                      domains:
                        - "*"
                      routes:
                        - match:
                            connect_matcher: {}
                          route:
                            cluster: dynamic_forward_proxy_cluster
                            upgrade_configs:
                              - upgrade_type: CONNECT
                                connect_config: {}
                        - match:
                            prefix: "/"
                          route:
                            cluster: dynamic_forward_proxy_cluster
                http_filters:
                  - name: envoy.filters.http.rbac
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBAC
                      rules:
                        action: DENY
                        policies:
                          deny_private_or_metadata_literals:
                            permissions:
                              - or_rules:
                                  rules:
                                    - header:
                                        name: ":authority"
                                        string_match:
                                          safe_regex:
                                            regex: "^localhost(:[0-9]+)?$"
                                    - header:
                                        name: "host"
                                        string_match:
                                          safe_regex:
                                            regex: "^localhost(:[0-9]+)?$"
                                    - header:
                                        name: ":authority"
                                        string_match:
                                          safe_regex:
                                            regex: "^(127\\..*|10\\..*|192\\.168\\..*|169\\.254\\..*)(:[0-9]+)?$"
                                    - header:
                                        name: "host"
                                        string_match:
                                          safe_regex:
                                            regex: "^(127\\..*|10\\..*|192\\.168\\..*|169\\.254\\..*)(:[0-9]+)?$"
                                    - header:
                                        name: ":authority"
                                        string_match:
                                          safe_regex:
                                            regex: "^172\\.(1[6-9]|2[0-9]|3[0-1])\\..*(:[0-9]+)?$"
                                    - header:
                                        name: "host"
                                        string_match:
                                          safe_regex:
                                            regex: "^172\\.(1[6-9]|2[0-9]|3[0-1])\\..*(:[0-9]+)?$"
                                    - header:
                                        name: ":authority"
                                        string_match:
                                          safe_regex:
                                            regex: "^\\[?::1\\]?(:[0-9]+)?$"
                                    - header:
                                        name: "host"
                                        string_match:
                                          safe_regex:
                                            regex: "^\\[?::1\\]?(:[0-9]+)?$"
                            principals:
                              - any: true
                  - name: envoy.filters.http.rbac
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBAC
                      rules:
                        action: ALLOW
                        policies:
                          allowed_domains:
                            permissions:
                              - or_rules:
                                  rules:
                                    {{ALLOW_POLICIES}}
                            principals:
                              - any: true
                  - name: envoy.filters.http.dynamic_forward_proxy
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.dynamic_forward_proxy.v3.FilterConfig
                      dns_cache_config:
                        name: egress_dynamic_forward_proxy_cache
                        dns_lookup_family: V4_ONLY
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: dynamic_forward_proxy_cluster
      lb_policy: CLUSTER_PROVIDED
      cluster_type:
        name: envoy.clusters.dynamic_forward_proxy
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.clusters.dynamic_forward_proxy.v3.ClusterConfig
          dns_cache_config:
            name: egress_dynamic_forward_proxy_cache
            dns_lookup_family: V4_ONLY
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 256
            max_pending_requests: 256
            max_requests: 256
            max_retries: 3
