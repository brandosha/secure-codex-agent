<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign In - Secure Agent</title>
  <style>
    :root {
      color-scheme: dark;
      --panel: rgba(15, 23, 42, 0.88);
      --border: rgba(148, 163, 184, 0.24);
      --text: #e5eefb;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --error: #fca5a5;
      --sans: "Inter", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(24px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right))
        max(24px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.2), transparent 34%),
        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.14), transparent 30%),
        linear-gradient(180deg, #020617 0%, #0f172a 55%, #111827 100%);
    }

    .login-card {
      width: min(100%, 430px);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 28px 70px rgba(2, 6, 23, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.15;
    }

    .intro {
      margin: 12px 0 26px;
      color: var(--muted);
      line-height: 1.55;
    }

    form {
      display: grid;
      gap: 18px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 650;
    }

    input {
      width: 100%;
      min-height: 50px;
      padding: 13px 15px;
      border: 1px solid var(--border);
      border-radius: 14px;
      outline: none;
      background: rgba(2, 6, 23, 0.48);
      color: var(--text);
      font: 16px var(--sans);
    }

    input:focus {
      border-color: rgba(56, 189, 248, 0.55);
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.14);
    }

    button {
      min-height: 50px;
      border: 0;
      border-radius: 14px;
      color: white;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.28);
      font: 700 16px var(--sans);
      cursor: pointer;
    }

    .error {
      margin: -4px 0 0;
      padding: 12px 14px;
      border: 1px solid rgba(248, 113, 113, 0.28);
      border-radius: 12px;
      color: var(--error);
      background: rgba(127, 29, 29, 0.2);
      font-size: 14px;
    }

    .error[hidden] {
      display: none;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 26px 22px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="login-card">
    <p class="eyebrow">Secure Codex Agent</p>
    <h1>Welcome back</h1>
    <p class="intro">Sign in to open the live agent console.</p>

    <form method="post" action="/chat/login">
      <p class="error" id="login-error" role="alert" hidden>Invalid username or password.</p>
      <label>
        Username
        <input name="username" type="text" autocomplete="username" autocapitalize="none" required autofocus>
      </label>
      <label>
        Password
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Sign in</button>
    </form>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("error") === "invalid") {
      document.getElementById("login-error").hidden = false;
    }
  </script>
</body>
</html>
